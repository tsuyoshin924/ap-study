<script>
const EXAMS = [
  { id: 'r07a', label: 'R07秋期', file: 'data/r07a_am.json' },
  { id: 'r07s', label: 'R07春期', file: 'data/r07s_am.json' },
];

let AM_QUESTIONS = [];
let currentYear = 'r07a';

async function switchYear(year) {
  currentYear = year;
  // ボタン更新
  document.querySelectorAll('.year-btn').forEach(b => {
    b.style.background = b.id === 'btn-' + year ? '#f5c842' : '#1e2230';
    b.style.color = b.id === 'btn-' + year ? '#0d0f14' : '#6b7394';
    b.style.borderColor = b.id === 'btn-' + year ? '#f5c842' : '#2a2e3d';
  });
  // JSONを動的読み込み
  const exam = EXAMS.find(e => e.id === year);
  const res = await fetch(exam.file);
  const data = await res.json();
  AM_QUESTIONS = data.questions;
  goMenu();
}

// 初期ロード
switchYear('r07a');
</script>
