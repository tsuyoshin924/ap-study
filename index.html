<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP対策アプリ — 応用情報技術者試験</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2e3d;
    --text: #e2e6f0;
    --text-muted: #6b7394;
    --accent-am: #f5c842;
    --accent-pm: #b07ef8;
    --green: #4ade80;
    --red: #f87171;
    --cyan: #67e8f9;
    --radius: 12px;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
  }

  /* ── グリッドノイズ背景 ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
  }

  /* ── ヘッダー ── */
  header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown .5s ease both;
  }
  .header-badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .12em;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 16px;
  }
  header h1 {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 700;
    letter-spacing: -.02em;
    line-height: 1.2;
  }
  header h1 span { color: var(--accent-am); }
  .header-sub {
    margin-top: 8px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ── カード ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 16px;
    animation: fadeUp .4s ease both;
  }
  .card + .card { animation-delay: .07s; }

  /* ── メニュー ── */
  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .mode-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
    cursor: pointer;
    transition: border-color .2s, transform .15s, background .2s;
    text-align: left;
    color: var(--text);
    font-family: var(--sans);
  }
  .mode-btn:hover { transform: translateY(-2px); }
  .mode-btn.am:hover { border-color: var(--accent-am); background: rgba(245,200,66,.06); }
  .mode-btn.pm:hover { border-color: var(--accent-pm); background: rgba(176,126,248,.06); }
  .mode-btn .mode-icon { font-size: 28px; margin-bottom: 10px; display: block; }
  .mode-btn .mode-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .mode-btn.am .mode-title { color: var(--accent-am); }
  .mode-btn.pm .mode-title { color: var(--accent-pm); }
  .mode-btn .mode-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

  /* ── セクションヘッダ ── */
  .section-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .section-head .icon { font-size: 20px; }
  .section-head h2 { font-size: 16px; font-weight: 700; }
  .section-head .tag {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: auto;
  }
  .tag-tech   { background: rgba(103,232,249,.15); color: var(--cyan); }
  .tag-mgmt   { background: rgba(245,200,66,.15);  color: var(--accent-am); }
  .tag-strat  { background: rgba(74,222,128,.15);  color: var(--green); }
  .tag-sec    { background: rgba(248,113,113,.15); color: var(--red); }
  .tag-pm     { background: rgba(176,126,248,.15); color: var(--accent-pm); }

  /* ── メタ情報 ── */
  .meta-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .meta-chip {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  /* ── 問題文 ── */
  .question-text {
    font-size: 15px;
    line-height: 1.9;
    margin-bottom: 24px;
    white-space: pre-wrap;
    color: var(--text);
  }

  /* ── 4択ボタン ── */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    cursor: pointer;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    text-align: left;
    transition: border-color .15s, background .15s, transform .1s;
    line-height: 1.6;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--cyan);
    background: rgba(103,232,249,.06);
    transform: translateX(3px);
  }
  .option-btn.correct {
    border-color: var(--green);
    background: rgba(74,222,128,.1);
    color: var(--green);
  }
  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(248,113,113,.1);
    color: var(--red);
  }
  .option-btn:disabled { cursor: default; transform: none; }

  /* ── 結果バナー ── */
  .result-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 20px;
    animation: fadeUp .3s ease both;
  }
  .result-banner.correct { background: rgba(74,222,128,.12); border: 1px solid var(--green); color: var(--green); }
  .result-banner.wrong   { background: rgba(248,113,113,.12); border: 1px solid var(--red);   color: var(--red); }
  .result-banner .correct-ans { color: var(--green); font-family: var(--mono); }

  /* ── 解説ブロック ── */
  .explanation {
    background: var(--surface2);
    border-left: 3px solid var(--cyan);
    border-radius: 0 8px 8px 0;
    padding: 16px 18px;
    font-size: 13.5px;
    line-height: 1.9;
    white-space: pre-wrap;
    color: var(--text-muted);
    animation: fadeUp .3s .1s ease both;
  }
  .explanation-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--cyan);
    letter-spacing: .08em;
    margin-bottom: 10px;
    display: block;
  }

  /* ── 午後：長文 ── */
  .context-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    font-size: 13.5px;
    line-height: 2;
    white-space: pre-wrap;
    color: var(--text-muted);
    margin-bottom: 20px;
    max-height: 360px;
    overflow-y: auto;
  }
  .context-box::-webkit-scrollbar { width: 4px; }
  .context-box::-webkit-scrollbar-track { background: transparent; }
  .context-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .setsumon-box {
    background: rgba(176,126,248,.07);
    border: 1.5px solid rgba(176,126,248,.3);
    border-radius: 8px;
    padding: 18px 20px;
    font-size: 14px;
    line-height: 1.9;
    white-space: pre-wrap;
    margin-bottom: 24px;
    color: var(--text);
  }

  /* ── 模範解答 ── */
  .answer-block {
    background: rgba(74,222,128,.07);
    border: 1.5px solid rgba(74,222,128,.3);
    border-radius: 8px;
    padding: 16px 18px;
    font-size: 14px;
    line-height: 1.9;
    white-space: pre-wrap;
    margin-bottom: 14px;
    animation: fadeUp .3s ease both;
  }
  .answer-block .block-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--green);
    letter-spacing: .08em;
    margin-bottom: 10px;
    display: block;
  }
  .grading-block {
    background: rgba(245,200,66,.07);
    border: 1.5px solid rgba(245,200,66,.3);
    border-radius: 8px;
    padding: 16px 18px;
    font-size: 13px;
    line-height: 1.9;
    white-space: pre-wrap;
    margin-bottom: 14px;
    animation: fadeUp .3s .08s ease both;
  }
  .grading-block .block-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent-am);
    letter-spacing: .08em;
    margin-bottom: 10px;
    display: block;
  }

  /* ── 自己採点ボタン ── */
  .self-score-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 8px;
    animation: fadeUp .3s .16s ease both;
  }
  .self-btn {
    padding: 16px;
    border-radius: 8px;
    border: 1.5px solid;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    transition: transform .15s, background .15s;
  }
  .self-btn:hover { transform: translateY(-2px); }
  .self-btn.yes { border-color: var(--green); color: var(--green); background: rgba(74,222,128,.06); }
  .self-btn.yes:hover { background: rgba(74,222,128,.14); }
  .self-btn.no  { border-color: var(--red);   color: var(--red);   background: rgba(248,113,113,.06); }
  .self-btn.no:hover  { background: rgba(248,113,113,.14); }

  /* ── 汎用ボタン ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 12px 24px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    transition: transform .15s, opacity .15s;
  }
  .btn:hover { transform: translateY(-1px); opacity: .9; }
  .btn-primary { background: var(--accent-am); color: #0d0f14; }
  .btn-pm      { background: var(--accent-pm); color: #0d0f14; }
  .btn-ghost   {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }

  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 20px;
  }

  /* ── 進捗バー（簡易） ── */
  .score-strip {
    display: flex;
    gap: 16px;
    padding: 12px 20px;
    background: var(--surface2);
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    animation: fadeDown .4s ease both;
  }
  .score-item { display: flex; align-items: center; gap: 6px; }
  .score-item .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-green { background: var(--green); }
  .dot-red   { background: var(--red); }

  /* ── 仕切り線 ── */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  /* ── Enterプロンプト ── */
  .enter-prompt {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 20px;
  }
  .enter-key {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
  }

  /* ── アニメーション ── */
  @keyframes fadeUp   { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }

  /* ── hidden ── */
  .hidden { display: none !important; }

  /* ── レスポンシブ ── */
  @media (max-width: 480px) {
    .menu-grid { grid-template-columns: 1fr; }
    .self-score-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ヘッダー -->
  <header>
    <div class="header-badge">AP STUDY</div>
    <h1>応用情報技術者試験<br><span>対策アプリ</span></h1>
    <p class="header-sub">午前 4択 / 午後 記述式・自己採点</p>
  </header>

  <!-- スコアストリップ -->
  <div class="score-strip" id="scoreStrip">
    <div class="score-item"><div class="dot dot-green"></div><span>正解: <strong id="scoreCorrect">0</strong></span></div>
    <div class="score-item"><div class="dot dot-red"></div><span>不正解: <strong id="scoreWrong">0</strong></span></div>
    <div class="score-item" style="margin-left:auto; color:var(--text-muted)">累計 <strong id="scoreTotal">0</strong> 問</div>
  </div>

  <!-- ─── メニュー画面 ─── -->
  <div id="screenMenu" class="card">
    <div class="section-head">
      <span class="icon">📖</span>
      <h2>モード選択</h2>
    </div>
    <div class="menu-grid">
      <button class="mode-btn am" onclick="startMode('am')">
        <span class="mode-icon">☀️</span>
        <div class="mode-title">午前モード</div>
        <div class="mode-desc">4択問題をランダム出題<br>即時正誤判定・解説表示</div>
      </button>
      <button class="mode-btn pm" onclick="startMode('pm')">
        <span class="mode-icon">🌙</span>
        <div class="mode-title">午後モード</div>
        <div class="mode-desc">記述式の設問を出題<br>模範解答と自己採点</div>
      </button>
    </div>
  </div>

  <!-- ─── 午前：問題画面 ─── -->
  <div id="screenAm" class="hidden">
    <div class="card" id="amQuestionCard">
      <div class="section-head">
        <span class="icon">☀️</span>
        <h2>午前モード</h2>
        <span class="tag" id="amTag">テクノロジ系</span>
      </div>
      <div class="meta-row">
        <span class="meta-chip" id="amCategory">—</span>
        <span class="meta-chip" id="amField">—</span>
      </div>
      <p class="question-text" id="amQuestion">—</p>
      <div class="options" id="amOptions"></div>
    </div>

    <!-- 結果パネル（回答後に表示） -->
    <div id="amResult" class="hidden">
      <div class="result-banner" id="amResultBanner"></div>
      <div class="card" style="padding-top:20px">
        <span class="explanation-label">EXPLANATION</span>
        <div class="explanation" id="amExplanation"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="nextQuestion('am')">次の問題へ →</button>
        <button class="btn btn-ghost" onclick="goMenu()">メニューに戻る</button>
      </div>
    </div>
  </div>

  <!-- ─── 午後：問題画面 ─── -->
  <div id="screenPm" class="hidden">
    <div class="card" id="pmQuestionCard">
      <div class="section-head">
        <span class="icon">🌙</span>
        <h2>午後モード</h2>
        <span class="tag tag-sec" id="pmField">—</span>
      </div>
      <p style="font-size:12px; color:var(--text-muted); margin-bottom:14px;">▼ 状況文（スクロール可）</p>
      <div class="context-box" id="pmContext">—</div>
      <div class="setsumon-box" id="pmQuestion">—</div>
      <div class="enter-prompt">
        <span class="enter-key">回答がまとまったら</span>
        <span>下のボタンを押して模範解答を見る</span>
      </div>
      <button class="btn btn-pm" onclick="revealPmAnswer()">模範解答を見る →</button>
    </div>

    <!-- 模範解答パネル（ボタン押後に表示） -->
    <div id="pmAnswer" class="hidden">
      <div class="card">
        <div class="answer-block">
          <span class="block-label">IDEAL ANSWER — 模範解答</span>
          <div id="pmIdealAnswer">—</div>
        </div>
        <div class="grading-block">
          <span class="block-label">GRADING CRITERIA — 採点基準</span>
          <div id="pmGrading">—</div>
        </div>
        <hr class="divider">
        <span class="explanation-label">EXPLANATION — 解説</span>
        <div class="explanation" id="pmExplanation">—</div>
      </div>

      <div class="card">
        <p style="font-size:14px; font-weight:700; margin-bottom:14px;">自己採点：正解できましたか？</p>
        <div class="self-score-row">
          <button class="self-btn yes" onclick="selfScore(true)">✔ 正解（自己採点 OK）</button>
          <button class="self-btn no"  onclick="selfScore(false)">✘ 不正解（要復習）</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── 自己採点完了 ─── -->
  <div id="screenPmDone" class="hidden">
    <div class="card" id="pmDoneCard">
      <div class="result-banner" id="pmDoneBanner"></div>
      <div class="btn-row">
        <button class="btn btn-pm" onclick="nextQuestion('pm')">次の問題へ →</button>
        <button class="btn btn-ghost" onclick="goMenu()">メニューに戻る</button>
      </div>
    </div>
  </div>

</div><!-- /.app -->

<script>
// ─────────────────────────────────────────
// データ（questions_am.json / questions_pm.json を埋め込み）
// ─────────────────────────────────────────
const AM_QUESTIONS = [
  {
    id: 1, category: "テクノロジ系", field: "基礎理論",
    question: "2進数の「1011 0110」を16進数で表したものはどれか。",
    options: ["ア: A6", "イ: B6", "ウ: B7", "エ: C6"],
    answer: "イ",
    explanation: "2進数を4ビットずつに区切って16進数に変換します。\n「1011」= 11(10進) = B(16進)、「0110」= 6(10進) = 6(16進)\nよって「1011 0110」(2) = B6(16) となります。"
  },
  {
    id: 2, category: "テクノロジ系", field: "アルゴリズムとプログラミング",
    question: "スタック（Stack）に関する説明として正しいものはどれか。",
    options: [
      "ア: 先に入れたデータを先に取り出すFIFO（先入れ先出し）構造をもつ",
      "イ: 後に入れたデータを先に取り出すLIFO（後入れ先出し）構造をもつ",
      "ウ: データの挿入と取り出しを先頭と末尾の両方から行える",
      "エ: データを優先度順に取り出すことができる"
    ],
    answer: "イ",
    explanation: "スタックはLIFO（Last In First Out：後入れ先出し）構造です。\nアはキュー（Queue）の説明、ウはデック（Deque）の説明、エは優先度付きキューの説明です。\nスタックはサブルーチンの呼び出し管理や、数式の評価などに使われます。"
  },
  {
    id: 3, category: "テクノロジ系", field: "コンピュータ構成要素",
    question: "キャッシュメモリに関する説明として適切なものはどれか。",
    options: [
      "ア: 主記憶よりもアクセス速度が遅く、大容量のデータを保存できる",
      "イ: CPUと主記憶の間に置かれ、主記憶へのアクセス頻度を下げることで処理を高速化する",
      "ウ: 電源を切るとデータが消える揮発性のメモリであり、HDDより容量が大きい",
      "エ: プログラム実行中には書き込みができない読み取り専用のメモリである"
    ],
    answer: "イ",
    explanation: "キャッシュメモリはCPUと主記憶（RAM）の間に置かれる高速な記憶装置です。\nよく使うデータをキャッシュに保持することで、低速な主記憶へのアクセス回数を減らし、全体の処理速度を向上させます（局所参照性の原理）。\nアは補助記憶装置（HDD等）の説明、エはROMの説明です。"
  },
  {
    id: 4, category: "テクノロジ系", field: "情報セキュリティ",
    question: "公開鍵暗号方式の特徴として正しいものはどれか。",
    options: [
      "ア: 暗号化と復号に同じ鍵を使用するため、鍵管理が容易である",
      "イ: 送信者は受信者の公開鍵で暗号化し、受信者は自分の秘密鍵で復号する",
      "ウ: 共通鍵暗号方式に比べて処理速度が速いため、大量データの暗号化に適している",
      "エ: 電子署名には使用できず、暗号化通信専用の方式である"
    ],
    answer: "イ",

// ─────────────────────────────────────────
// 状態管理
// ─────────────────────────────────────────
const state = {
  correct: 0,
  wrong: 0,
  currentAm: null,
  currentPm: null,
};

function updateScore() {
  document.getElementById('scoreCorrect').textContent = state.correct;
  document.getElementById('scoreWrong').textContent   = state.wrong;
  document.getElementById('scoreTotal').textContent   = state.correct + state.wrong;
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// ─────────────────────────────────────────
// 画面切り替え
// ─────────────────────────────────────────
function showOnly(...ids) {
  ['screenMenu','screenAm','screenPm','screenPmDone'].forEach(id => {
    document.getElementById(id).classList.add('hidden');
  });
  ids.forEach(id => document.getElementById(id)?.classList.remove('hidden'));
}

function goMenu() {
  showOnly('screenMenu');
}

// ─────────────────────────────────────────
// カテゴリタグ
// ─────────────────────────────────────────
const TAG_CLASS = {
  'テクノロジ系':   'tag-tech',
  'マネジメント系': 'tag-mgmt',
  'ストラテジ系':   'tag-strat',
};
const FIELD_TAG_CLASS = {
  '情報セキュリティ':         'tag-sec',
  'プロジェクトマネジメント': 'tag-pm',
};

// ─────────────────────────────────────────
// 午前モード
// ─────────────────────────────────────────
function startMode(mode) {
  if (mode === 'am') loadAmQuestion();
  else               loadPmQuestion();
}

function loadAmQuestion() {
  const q = pickRandom(AM_QUESTIONS);
  state.currentAm = q;

  // タグ
  const tagEl = document.getElementById('amTag');
  tagEl.textContent  = q.category;
  tagEl.className    = 'tag ' + (TAG_CLASS[q.category] ?? 'tag-tech');

  document.getElementById('amCategory').textContent = q.category;
  document.getElementById('amField').textContent    = q.field;
  document.getElementById('amQuestion').textContent = q.question;

  // 選択肢
  const container = document.getElementById('amOptions');
  container.innerHTML = '';
  q.options.forEach(opt => {
    const key = opt.split(':')[0].trim();
    const btn = document.createElement('button');
    btn.className   = 'option-btn';
    btn.textContent = opt;
    btn.onclick     = () => answerAm(key, q);
    container.appendChild(btn);
  });

  // 結果非表示
  document.getElementById('amResult').classList.add('hidden');
  document.getElementById('amResultBanner').className = 'result-banner';

  showOnly('screenAm');
}

function answerAm(selected, q) {
  // 全ボタン無効化 + 色付け
  document.querySelectorAll('#amOptions .option-btn').forEach(btn => {
    btn.disabled = true;
    const key = btn.textContent.split(':')[0].trim();
    if (key === q.answer)  btn.classList.add('correct');
    if (key === selected && key !== q.answer) btn.classList.add('wrong');
  });

  const isCorrect = selected === q.answer;
  if (isCorrect) state.correct++; else state.wrong++;
  updateScore();

  // バナー
  const banner = document.getElementById('amResultBanner');
  if (isCorrect) {
    banner.className   = 'result-banner correct';
    banner.innerHTML   = '✔ 正解！';
  } else {
    banner.className   = 'result-banner wrong';
    banner.innerHTML   = `✘ 不正解　<span style="font-size:13px;font-weight:400;color:var(--text-muted)">正解：</span><span class="correct-ans">${q.answer}</span>`;
  }

  document.getElementById('amExplanation').textContent = q.explanation;
  document.getElementById('amResult').classList.remove('hidden');
}

function nextQuestion(mode) {
  if (mode === 'am') loadAmQuestion();
  else               loadPmQuestion();
}

// ─────────────────────────────────────────
// 午後モード
// ─────────────────────────────────────────
function loadPmQuestion() {
  const q = pickRandom(PM_QUESTIONS);
  state.currentPm = q;

  const fieldTag = document.getElementById('pmField');
  fieldTag.textContent = q.field;
  fieldTag.className   = 'tag ' + (FIELD_TAG_CLASS[q.field] ?? 'tag-pm');

  document.getElementById('pmContext').textContent  = q.context;
  document.getElementById('pmQuestion').textContent = q.question;

  document.getElementById('pmAnswer').classList.add('hidden');
  document.getElementById('screenPmDone').classList.add('hidden');

  showOnly('screenPm');
}

function revealPmAnswer() {
  const q = state.currentPm;
  document.getElementById('pmIdealAnswer').textContent = q.ideal_answer;
  document.getElementById('pmGrading').textContent     = q.grading_criteria;
  document.getElementById('pmExplanation').textContent = q.explanation;
  document.getElementById('pmAnswer').classList.remove('hidden');

  // 模範解答へスクロール
  document.getElementById('pmAnswer').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function selfScore(isOk) {
  if (isOk) state.correct++; else state.wrong++;
  updateScore();

  const banner = document.getElementById('pmDoneBanner');
  if (isOk) {
    banner.className = 'result-banner correct';
    banner.textContent = '✔ 正解（自己採点 OK）　素晴らしい！';
  } else {
    banner.className = 'result-banner wrong';
    banner.textContent = '✘ 不正解　解説を復習して次に活かしましょう！';
  }

  document.getElementById('screenPmDone').classList.remove('hidden');
  document.getElementById('screenPmDone').scrollIntoView({ behavior: 'smooth' });
}
</script>
