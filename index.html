<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP対策アプリ — 応用情報技術者試験 午前対策</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2e3d;
    --text: #e2e6f0;
    --text-muted: #6b7394;
    --accent-am: #f5c842;
    --accent-pm: #b07ef8;
    --green: #4ade80;
    --red: #f87171;
    --cyan: #67e8f9;
    --radius: 12px;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
  }

  /* ── グリッドノイズ背景 ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
  }

  /* ── ヘッダー ── */
  header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown .5s ease both;
  }
  .header-badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .12em;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 16px;
  }
  header h1 {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 700;
    letter-spacing: -.02em;
    line-height: 1.2;
  }
  header h1 span { color: var(--accent-am); }
  .header-sub {
    margin-top: 8px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ── カード ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 16px;
    animation: fadeUp .4s ease both;
  }
  .card + .card { animation-delay: .07s; }

  /* ── メニュー ── */
  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .mode-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
    cursor: pointer;
    transition: border-color .2s, transform .15s, background .2s;
    text-align: left;
    color: var(--text);
    font-family: var(--sans);
  }
  .mode-btn:hover { transform: translateY(-2px); }
  .mode-btn.am:hover { border-color: var(--accent-am); background: rgba(245,200,66,.06); }
  .mode-btn.pm:hover { border-color: var(--accent-pm); background: rgba(176,126,248,.06); }
  .mode-btn .mode-icon { font-size: 28px; margin-bottom: 10px; display: block; }
  .mode-btn .mode-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .mode-btn.am .mode-title { color: var(--accent-am); }
  .mode-btn.pm .mode-title { color: var(--accent-pm); }
  .mode-btn .mode-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

  /* ── セクションヘッダ ── */
  .section-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .section-head .icon { font-size: 20px; }
  .section-head h2 { font-size: 16px; font-weight: 700; }
  .section-head .tag {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: auto;
  }
  .tag-tech   { background: rgba(103,232,249,.15); color: var(--cyan); }
  .tag-mgmt   { background: rgba(245,200,66,.15);  color: var(--accent-am); }
  .tag-strat  { background: rgba(74,222,128,.15);  color: var(--green); }
  .tag-sec    { background: rgba(248,113,113,.15); color: var(--red); }
  .tag-pm     { background: rgba(176,126,248,.15); color: var(--accent-pm); }

  /* ── メタ情報 ── */
  .meta-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .meta-chip {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  /* ── 問題文 ── */
  .question-text {
    font-size: 15px;
    line-height: 1.9;
    margin-bottom: 24px;
    white-space: pre-wrap;
    color: var(--text);
  }

  /* ── 4択ボタン ── */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    cursor: pointer;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    text-align: left;
    transition: border-color .15s, background .15s, transform .1s;
    line-height: 1.6;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--cyan);
    background: rgba(103,232,249,.06);
    transform: translateX(3px);
  }
  .option-btn.correct {
    border-color: var(--green);
    background: rgba(74,222,128,.1);
    color: var(--green);
  }
  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(248,113,113,.1);
    color: var(--red);
  }
  .option-btn:disabled { cursor: default; transform: none; }

  /* ── 結果バナー ── */
  .result-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 20px;
    animation: fadeUp .3s ease both;
  }
  .result-banner.correct { background: rgba(74,222,128,.12); border: 1px solid var(--green); color: var(--green); }
  .result-banner.wrong   { background: rgba(248,113,113,.12); border: 1px solid var(--red);   color: var(--red); }
  .result-banner .correct-ans { color: var(--green); font-family: var(--mono); }

  /* ── 解説ブロック ── */
  .explanation {
    background: var(--surface2);
    border-left: 3px solid var(--cyan);
    border-radius: 0 8px 8px 0;
    padding: 16px 18px;
    font-size: 13.5px;
    line-height: 1.9;
    white-space: pre-wrap;
    color: var(--text-muted);
    animation: fadeUp .3s .1s ease both;
  }
  .explanation-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--cyan);
    letter-spacing: .08em;
    margin-bottom: 10px;
    display: block;
  }

  /* ── 午後：長文 ── */
  .context-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    font-size: 13.5px;
    line-height: 2;
    white-space: pre-wrap;
    color: var(--text-muted);
    margin-bottom: 20px;
    max-height: 360px;
    overflow-y: auto;
  }
  .context-box::-webkit-scrollbar { width: 4px; }
  .context-box::-webkit-scrollbar-track { background: transparent; }
  .context-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .setsumon-box {
    background: rgba(176,126,248,.07);
    border: 1.5px solid rgba(176,126,248,.3);
    border-radius: 8px;
    padding: 18px 20px;
    font-size: 14px;
    line-height: 1.9;
    white-space: pre-wrap;
    margin-bottom: 24px;
    color: var(--text);
  }

  /* ── 模範解答 ── */
  .answer-block {
    background: rgba(74,222,128,.07);
    border: 1.5px solid rgba(74,222,128,.3);
    border-radius: 8px;
    padding: 16px 18px;
    font-size: 14px;
    line-height: 1.9;
    white-space: pre-wrap;
    margin-bottom: 14px;
    animation: fadeUp .3s ease both;
  }
  .answer-block .block-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--green);
    letter-spacing: .08em;
    margin-bottom: 10px;
    display: block;
  }
  .grading-block {
    background: rgba(245,200,66,.07);
    border: 1.5px solid rgba(245,200,66,.3);
    border-radius: 8px;
    padding: 16px 18px;
    font-size: 13px;
    line-height: 1.9;
    white-space: pre-wrap;
    margin-bottom: 14px;
    animation: fadeUp .3s .08s ease both;
  }
  .grading-block .block-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent-am);
    letter-spacing: .08em;
    margin-bottom: 10px;
    display: block;
  }

  /* ── 自己採点ボタン ── */
  .self-score-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 8px;
    animation: fadeUp .3s .16s ease both;
  }
  .self-btn {
    padding: 16px;
    border-radius: 8px;
    border: 1.5px solid;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    transition: transform .15s, background .15s;
  }
  .self-btn:hover { transform: translateY(-2px); }
  .self-btn.yes { border-color: var(--green); color: var(--green); background: rgba(74,222,128,.06); }
  .self-btn.yes:hover { background: rgba(74,222,128,.14); }
  .self-btn.no  { border-color: var(--red);   color: var(--red);   background: rgba(248,113,113,.06); }
  .self-btn.no:hover  { background: rgba(248,113,113,.14); }

  /* ── 汎用ボタン ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 12px 24px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    transition: transform .15s, opacity .15s;
  }
  .btn:hover { transform: translateY(-1px); opacity: .9; }
  .btn-primary { background: var(--accent-am); color: #0d0f14; }
  .btn-pm      { background: var(--accent-pm); color: #0d0f14; }
  .btn-ghost   {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }

  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 20px;
  }

  /* ── 進捗バー（簡易） ── */
  .score-strip {
    display: flex;
    gap: 16px;
    padding: 12px 20px;
    background: var(--surface2);
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    animation: fadeDown .4s ease both;
  }
  .score-item { display: flex; align-items: center; gap: 6px; }
  .score-item .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-green { background: var(--green); }
  .dot-red   { background: var(--red); }

  /* ── 仕切り線 ── */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  /* ── Enterプロンプト ── */
  .enter-prompt {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 20px;
  }
  .enter-key {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
  }

  /* ── アニメーション ── */
  @keyframes fadeUp   { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }

  /* ── hidden ── */
  .hidden { display: none !important; }

  /* ── レスポンシブ ── */
  @media (max-width: 480px) {
    .menu-grid { grid-template-columns: 1fr; }
    .self-score-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ヘッダー -->
  <header>
    <div class="header-badge">AP STUDY</div>
    <h1>応用情報技術者試験<br><span>対策アプリ</span></h1>
    <p class="header-sub">公式過去問 — 午前80問</p>
    <div style="margin-top:14px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
      <button id="btn-r07a" onclick="switchYear('r07a')" style="padding:8px 18px;border:1.5px solid #f5c842;border-radius:6px;background:#f5c842;color:#0d0f14;cursor:pointer;font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;">R07秋期</button>
      <button id="btn-r07s" onclick="switchYear('r07s')" style="padding:8px 18px;border:1.5px solid #2a2e3d;border-radius:6px;background:#1e2230;color:#6b7394;cursor:pointer;font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;">R07春期</button>
    </div>
  </header>

  <!-- スコアストリップ -->
  <div class="score-strip" id="scoreStrip">
    <div class="score-item"><div class="dot dot-green"></div><span>正解: <strong id="scoreCorrect">0</strong></span></div>
    <div class="score-item"><div class="dot dot-red"></div><span>不正解: <strong id="scoreWrong">0</strong></span></div>
    <div class="score-item" style="margin-left:auto; color:var(--text-muted)">累計 <strong id="scoreTotal">0</strong> 問</div>
  </div>

  <!-- ─── メニュー画面 ─── -->
  <div id="screenMenu" class="card">
    <div class="section-head">
      <span class="icon">📖</span>
      <h2>モード選択</h2>
    </div>
    <div class="menu-grid">
      <button class="mode-btn am" onclick="startMode('am')">
        <span class="mode-icon">☀️</span>
        <div class="mode-title">午前モード</div>
        <div class="mode-desc">4択問題をランダム出題<br>即時正誤判定・解説表示</div>
      </button>
      <button class="mode-btn pm" onclick="showPmComingSoon()" style="opacity:.45; cursor:not-allowed;">
        <span class="mode-icon">🌙</span>
        <div class="mode-title" style="color:var(--text-muted);">午後モード</div>
        <div class="mode-desc">図表を含む設問を整備中<br>近日公開予定</div>
      </button>
    </div>
  </div>

  <!-- ─── 午前：問題画面 ─── -->
  <div id="screenAm" class="hidden">
    <div class="card" id="amQuestionCard">
      <div class="section-head">
        <span class="icon">☀️</span>
        <h2>午前モード</h2>
        <span class="tag" id="amTag">テクノロジ系</span>
      </div>
      <div class="meta-row">
        <span class="meta-chip" id="amCategory">—</span>
        <span class="meta-chip" id="amField">—</span>
      </div>
      <p class="question-text" id="amQuestion">—</p>
      <div class="options" id="amOptions"></div>
    </div>

    <!-- 結果パネル（回答後に表示） -->
    <div id="amResult" class="hidden">
      <div class="result-banner" id="amResultBanner"></div>
      <div class="card" style="padding-top:20px">
        <span class="explanation-label">EXPLANATION</span>
        <div class="explanation" id="amExplanation"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="nextQuestion('am')">次の問題へ →</button>
        <button class="btn btn-ghost" onclick="goMenu()">メニューに戻る</button>
      </div>
    </div>
  </div>

  <!-- ─── 午後：問題画面 ─── -->
  <div id="screenPm" class="hidden">
    <div class="card" id="pmQuestionCard">
      <div class="section-head">
        <span class="icon">🌙</span>
        <h2>午後モード</h2>
        <span class="tag tag-sec" id="pmField">—</span>
      </div>
      <p id="pmSource" style="font-size:11px; color:var(--text-muted); font-family:var(--mono); margin-bottom:6px; letter-spacing:.05em;"></p>
      <p style="font-size:12px; color:var(--text-muted); margin-bottom:14px;">▼ 状況文（スクロール可）</p>
      <div class="context-box" id="pmContext">—</div>
      <div class="setsumon-box" id="pmQuestion">—</div>
      <div class="enter-prompt">
        <span class="enter-key">回答がまとまったら</span>
        <span>下のボタンを押して模範解答を見る</span>
      </div>
      <button class="btn btn-pm" onclick="revealPmAnswer()">模範解答を見る →</button>
    </div>

    <!-- 模範解答パネル（ボタン押後に表示） -->
    <div id="pmAnswer" class="hidden">
      <div class="card">
        <div class="answer-block">
          <span class="block-label">IDEAL ANSWER — 模範解答</span>
          <div id="pmIdealAnswer">—</div>
        </div>
        <div class="grading-block">
          <span class="block-label">GRADING CRITERIA — 採点基準</span>
          <div id="pmGrading">—</div>
        </div>
        <hr class="divider">
        <span class="explanation-label">EXPLANATION — 解説</span>
        <div class="explanation" id="pmExplanation">—</div>
      </div>

      <div class="card">
        <p style="font-size:14px; font-weight:700; margin-bottom:14px;">自己採点：正解できましたか？</p>
        <div class="self-score-row">
          <button class="self-btn yes" onclick="selfScore(true)">✔ 正解（自己採点 OK）</button>
          <button class="self-btn no"  onclick="selfScore(false)">✘ 不正解（要復習）</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── 自己採点完了 ─── -->
  <div id="screenPmDone" class="hidden">
    <div class="card" id="pmDoneCard">
      <div class="result-banner" id="pmDoneBanner"></div>
      <div class="btn-row">
        <button class="btn btn-pm" onclick="nextQuestion('pm')">次の問題へ →</button>
        <button class="btn btn-ghost" onclick="goMenu()">メニューに戻る</button>
      </div>
    </div>
  </div>

</div><!-- /.app -->

<script>
// ─────────────────────────────────────────
// データ（questions_am.json / questions_pm.json を埋め込み）
// ─────────────────────────────────────────
let AM_QUESTIONS = AM_QUESTIONS_R07A;

  {
    "id": 101,
    "category": "テクノロジ系",
    "field": "基礎理論",
    "question": "A, B, C, D を論理変数とするとき，次のカルノー図と等価な論理式はどれか。こ こで，・は論理積，＋は論理和，X̄ は X の否定を表す。\n\n【カルノー図】\nAB\\CD  00  01  11  10\n  00    1   0   0   1\n  01    0   1   1   0\n  11    0   1   1   0\n  10    0   0   0   0",
    "options": [
      "ア: A・B・C̄・D＋B̄・D̄",
      "イ: Ā・B̄・C̄・D̄＋B・D",
      "ウ: A・B・D＋B̄・D̄",
      "エ: Ā・B̄・D̄＋B・D"
    ],
    "answer": "エ",
    "explanation": "カルノー図の1のセルをグループ化します。\n\n【グループ1】(AB=00,CD=00)と(AB=00,CD=10)：A=0,B=0,D=0 → Ā・B̄・D̄\n【グループ2】AB=01とAB=11のCD=01,11のセル：B=1,D=1 → B・D\n\nしたがって論理式は Ā・B̄・D̄＋B・D となりエが正解です。"
  },
  {
    "id": 102,
    "category": "テクノロジ系",
    "field": "基礎理論",
    "question": "コンピュータによる伝票処理システムがある。このシステムは，伝票データをためる待ち行列をもち，M/M/1 の待ち行列モデルが適用できるものとする。平均待ち時間が T 秒以上となるのは，システムの利用率が少なくとも何%以上となったときか。",
    "options": [
      "ア: 33",
      "イ: 50",
      "ウ: 67",
      "エ: 80"
    ],
    "answer": "イ",
    "explanation": "M/M/1待ち行列の平均待ち時間 W = ρ / (μ(1-ρ))，平均サービス時間 1/μ = T\nW = ρT / (1-ρ) ≥ T\nρ / (1-ρ) ≥ 1\nρ ≥ 1-ρ\n2ρ ≥ 1 → ρ ≥ 0.5\nよって利用率が50%以上のときです。"
  },
  {
    "id": 103,

  {"id":401,"category":"基礎理論","field":"基礎理論","question":"論理式 P, Q がいずれも真であるとき、論理式 R の真偽にかかわらず真になる式はどれか。","options":["ア: ((P→Q)∧(Q→P))→(R→Q̄)","イ: ((P→Q)∧(Q→P̄))→(Q→R)","ウ: ((P→Q̄)∨(Q→P))→(R→Q̄)","エ: ((P→Q̄)∨(Q→P̄))→(Q→R)"],"answer":"エ","explanation":"P=真、Q=真のとき、エ：((真→偽)∨(真→偽))→(真→真) = 偽→真 = 真。Rの真偽によらず常に真となります。"},

  {"id":428,"category":"テクノロジ系","field":"データベース","question":"和両立な関係RとSがあるとき、R∩Sと等しいものはどれか。","options":["ア: (R-S)-(S-R)","イ: R-(R-S)","ウ: R-(S-R)","エ: S-(R-S)"],"answer":"イ","explanation":"R-(R-S) = RからRのみに存在する要素を引いたもの = R∩S。"},
  {"id":429,"category":"テクノロジ系","field":"ネットワーク","question":"無線LANのアクセスポイントにLANケーブルで給電も行う仕組みはどれか。","options":["ア: PLC","イ: PoE","ウ: UPS","エ: USB"],"answer":"イ","explanation":"PoE（Power over Ethernet）はLANケーブルで電力供給する技術です。"},
  {"id":430,"category":"テクノロジ系","field":"ネットワーク","question":"MTU 1500バイトのIPv4ネットワークで2000バイトのデータをTCPで送信するとき、2つ目のパケットに含まれるデータは何バイトか。TCPヘッダ20B、IPヘッダ20B。","options":["ア: 500","イ: 540","ウ: 580","エ: 598"],"answer":"イ","explanation":"1パケット目のデータ = 1500-20-20 = 1460B。2パケット目のデータ = 2000-1460 = 540B。"},
  {"id":431,"category":"テクノロジ系","field":"ネットワーク","question":"宛先IP 192.168.1.1のパケットを受信したとき、最長プレフィックスマッチで選択されるネクストホップはどれか。","options":["ア: 10.1.0.1","イ: 10.1.0.2","ウ: 10.1.0.3","エ: 10.1.0.4"],"answer":"エ","explanation":"最長プレフィックスマッチはマスク長が最も長い（最も具体的な）ルートを選択します。"},
  {"id":432,"category":"テクノロジ系","field":"ネットワーク","question":"ネットワーク 10.16.32.64/26 でアドレスを末尾から降順に割り当てるとき、10番目に割り当てられるアドレスはどれか。","options":["ア: 10.16.32.54","イ: 10.16.32.55","ウ: 10.16.32.117","エ: 10.16.32.118"],"answer":"ウ","explanation":"ブロードキャスト10.16.32.127から1つ引いた10.16.32.126が1番目。10番目は10.16.32.117。"},
  {"id":433,"category":"テクノロジ系","field":"ネットワーク","question":"データ転送と制御に異なるウェルノウンポート番号が割り当てられているプロトコルはどれか。","options":["ア: FTP","イ: POP3","ウ: SMTP","エ: SNMP"],"answer":"ア","explanation":"FTPはデータ転送(20番)と制御(21番)で異なるポートを使用します。"},
  {"id":434,"category":"テクノロジ系","field":"メディア","question":"30kバイトのJPEGファイルをMIME base64でエンコードして添付するとき、転送データはおよそ何kバイトか。","options":["ア: 20","イ: 30","ウ: 40","エ: 60"],"answer":"ウ","explanation":"Base64エンコードはデータを約4/3倍にします。30kB × 4/3 ≈ 40kB。"},
  {"id":435,"category":"テクノロジ系","field":"セキュリティ","question":"CRYPTREC暗号リストの電子政府推奨暗号リストの説明として適切なものはどれか。","options":["ア: 推奨候補暗号リストとは安全性が確認され利用を推奨するリスト。","イ: 推奨候補暗号リストとは互換性維持目的で利用するリスト。","ウ: 電子政府推奨暗号リストとは安全性と実装性能が確認され利用を推奨するリスト。","エ: 電子政府推奨暗号リストとは互換性維持目的で利用するリスト。"],"answer":"ウ","explanation":"電子政府推奨暗号リストは安全性・実装性能が確認され、利用が推奨される暗号技術のリストです。"},
  {"id":436,"category":"テクノロジ系","field":"セキュリティ","question":"PKIを構成するOCSPを利用する目的はどれか。","options":["ア: 誤って破棄した秘密鍵の再発行処理の進捗を問い合わせる。","イ: デジタル証明書が失効しているかどうかの状態を問い合わせる。","ウ: 鍵情報の交換が失敗した際、認証状態を確認する。","エ: 有効期限が切れた証明書の更新処理の進捗を確認する。"],"answer":"イ","explanation":"OCSP（Online Certificate Status Protocol）は証明書の失効状態をリアルタイムで確認するプロトコルです。"},
  {"id":437,"category":"テクノロジ系","field":"セキュリティ","question":"IoT機器におけるサイドチャネル攻撃に該当するものはどれか。","options":["ア: 暗号化関数を線形近似する式を導き秘密情報の取得を試みる。","イ: 機器が発生する電磁波を測定することによって秘密情報の取得を試みる。","ウ: 二つの平文の差と暗号文の差の関係から秘密情報の取得を試みる。","エ: あり得る復号鍵の全てを入力して秘密情報の取得を試みる。"],"answer":"イ","explanation":"サイドチャネル攻撃は消費電力・電磁波・処理時間などの物理的情報から秘密を推定します。"},
  {"id":438,"category":"テクノロジ系","field":"セキュリティ","question":"デジタル証明書の失効状態をリアルタイムで確認できる仕組みはどれか。","options":["ア: CRL","イ: OCSP","ウ: PKI","エ: TSA"],"answer":"イ","explanation":"OCSPは証明書失効状態をオンラインでリアルタイム確認できます。CRLは定期的に発行されるリストです。"},
  {"id":439,"category":"テクノロジ系","field":"組織","question":"欧米などで行われている「セキュリティクリアランス」の事例はどれか。","options":["ア: インターネットと秘密情報ネットワークを物理的に分離する。","イ: 重要情報へのアクセス権を定期的に調べ不要な場合は削除する。","ウ: 重要な秘密情報を取り扱う部門に配属される予定の個人の適性を評価する。","エ: 離席時に書類や媒体を施錠保管する。"],"answer":"ウ","explanation":"セキュリティクリアランスは機密情報を扱う人物の信頼性・適性を事前に審査する制度です。"},
  {"id":440,"category":"テクノロジ系","field":"ソフトウェア","question":"SBOMツールを用いることができる情報セキュリティ対策はどれか。","options":["ア: 利用者認証に用いるアカウントの一元管理","イ: ソフトウェアについての脆弱性管理","ウ: ソースコードのバージョン管理・アクセス制御・改ざん防止","エ: ソースコードのバックアップとマルウェア混入防止"],"answer":"イ","explanation":"SBOM（ソフトウェア部品表）はコンポーネントの脆弱性を追跡・管理するのに活用できます。"},
  {"id":441,"category":"マネジメント系","field":"プロジェクト管理","question":"EVMでSPI>1かつCPI<1のプロジェクトへの適切な対策はどれか。","options":["ア: CPIに基づき完成コストを予測する。","イ: スケジュールに余裕があるのでコスト効率改善かコンティンジェンシー予備費使用を検討する。","ウ: コストに余裕があるがスケジュールが遅れておりファストトラッキング等を検討する。","エ: クラッシングでスケジュール短縮を検討する。"],"answer":"イ","explanation":"SPI>1はスケジュール順調、CPI<1はコスト超過。コスト対策とコンティンジェンシー予備費が適切です。"},
  {"id":442,"category":"マネジメント系","field":"品質管理","question":"ソフトウェアの保守性を定量評価するときに使用する指標として適切なものはどれか。","options":["ア: (運用期間中の不具合数)÷(規模)","イ: (適正規模基準を満たすプログラム数)÷(総プログラム数)","ウ: (テスト実施済み分岐数)÷(総分岐数)","エ: (推定総エラー数)-(摘出エラー数)"],"answer":"イ","explanation":"保守性の指標は適正規模のモジュール比率です。アは信頼性、ウはカバレッジ、エは残存バグ数。"},
  {"id":443,"category":"マネジメント系","field":"品質管理","question":"テスト密度が基準値の80%未満かつ欠陥密度が基準値の80%未満の領域にある場合、行うべき活動として最も適切なものはどれか。","options":["ア: 欠陥の受当性を確認する。","イ: 欠陥の原因を分析し品質改善に取り組む。","ウ: テストケースの受当性を確認しテストケースを追加する。","エ: テストケースを追加する。"],"answer":"ウ","explanation":"テスト密度不足・欠陥密度不足はテストが不十分な可能性があり、テストケースの妥当性確認が必要です。"},
  {"id":444,"category":"マネジメント系","field":"セキュリティ","question":"パスワードクラック対策のうち、ストレッチングに該当するものはどれか。","options":["ア: 質問と答えを登録し異なるログイン方法の場合に追加質問を行う。","イ: 一定回数誤るとそれ以降のログインを拒否する。","ウ: ハッシュ化を繰り返してパスワードのハッシュ値を求める。","エ: 利用者IDごとに異なる文字列を付加してハッシュ化する。"],"answer":"ウ","explanation":"ストレッチングはハッシュ化を繰り返すことでブルートフォース攻撃を困難にする手法です。エはソルティング。"},
  {"id":445,"category":"マネジメント系","field":"ソフトウェア開発","question":"デザインレビューの目的はどれか。","options":["ア: 設計工程内で成果物の問題点を発見する。","イ: 品質保証部門が成果物の出荷可否を判定する。","ウ: 品質保証部門によるサンプリング検査で品質上の問題点を発見する。","エ: プロジェクトマネジメントのプロセス上の問題点を発見する。"],"answer":"ア","explanation":"デザインレビューは設計工程の中で成果物の問題を早期発見することを目的とします。"},
  {"id":446,"category":"マネジメント系","field":"業務プロセス","question":"二つの稼働環境を用意しロードバランサーで切り替えてダウンタイムを短くする手法を何というか。","options":["ア: ブルーグリーンデプロイメント","イ: ホットスタンバイ","ウ: ホットスワップ","エ: ローリングアップデート"],"answer":"ア","explanation":"ブルーグリーンデプロイメントは2つの同一環境を交互に使う展開手法です。"},
  {"id":447,"category":"マネジメント系","field":"プロジェクト管理","question":"ソフトウェアの保守性指標として適切なものはどれか。","options":["ア: (運用期間中の不具合数)÷(規模)","イ: (適正規模プログラム数)÷(総プログラム数)","ウ: (テスト済み分岐数)÷(総分岐数)","エ: (推定総エラー数)-(摘出エラー数)"],"answer":"イ","explanation":"保守性の定量指標は適正規模モジュールの比率です。"},
  {"id":448,"category":"マネジメント系","field":"XP","question":"XP（エクストリームプログラミング）のプラクティスの一つはどれか。","options":["ア: 構造化プログラミング","イ: コンポーネント指向プログラミング","ウ: ビジュアルプログラミング","エ: ペアプログラミング"],"answer":"エ","explanation":"XPのプラクティスにはペアプログラミング、テスト駆動開発、継続的インテグレーションなどがあります。"},
  {"id":449,"category":"マネジメント系","field":"品質管理","question":"カオスエンジニアリングの5原則のうち残り2つの組み合わせはどれか。","options":["ア: 「開発環境で実験」「影響範囲を局所化する」","イ: 「開発環境で実験」「影響範囲を広く捉える」","ウ: 「本番環境で実験」「影響範囲を局所化する」","エ: 「本番環境で実験」「影響範囲を広く捉える」"],"answer":"ウ","explanation":"カオスエンジニアリングは本番環境で実験し、影響範囲を最小化しながら実施します。"},
  {"id":450,"category":"マネジメント系","field":"スクラム","question":"スクラムでステークホルダに作業結果をプレゼンしプロダクトゴールへの進捗を話し合うイベントはどれか。","options":["ア: スプリントプランニング","イ: スプリントレビュー","ウ: デイリースクラム","エ: レトロスペクティブ"],"answer":"イ","explanation":"スプリントレビューはステークホルダへのデモと進捗確認を行うイベントです。"},
  {"id":451,"category":"マネジメント系","field":"プロジェクト管理","question":"プロジェクト憲章の説明はどれか。","options":["ア: スケジュール・リスクなどのマネジメント方法を規定する文書","イ: プロジェクトのスコープ・目標・成果物・境界を記した文書","ウ: WBSとして実行作業を階層構造で記した文書","エ: プロジェクトを正式に認可するためにビジネスニーズ・目標・PMの責任・権限を記した文書"],"answer":"エ","explanation":"プロジェクト憲章はプロジェクトを公式に認可し、PMに権限を与える文書です。"},
  {"id":452,"category":"マネジメント系","field":"プロジェクト管理","question":"EVMでSPI<1かつCPI<1のプロジェクトへの対策はどれか。","options":["ア: CPIに基づき完成コストを予測する。","イ: スケジュールに余裕があるのでコスト効率改善かコンティンジェンシー予備費使用を検討する。","ウ: コストに余裕があるがスケジュールが遅れておりファストトラッキングとコンティンジェンシー予備費を検討する。","エ: コストに余裕があるのでクラッシングでスケジュール短縮を検討する。"],"answer":"イ","explanation":"SPI<1はスケジュール遅延、CPI<1はコスト超過。両方への対応が必要です。"},
  {"id":453,"category":"マネジメント系","field":"プロジェクト管理","question":"プロジェクト期間短縮のうちクラッシングに該当するものはどれか。","options":["ア: 作業の前後関係を組み直し実施順序を変える。","イ: 同時実施できる部分を分割し並行実施する。","ウ: 先行作業の一部完成時点で後続作業を開始する。","エ: 外部から要員を調達しクリティカルパス上の作業に投入する。"],"answer":"エ","explanation":"クラッシングはコストをかけて（要員追加等で）スケジュールを短縮する手法です。"},
  {"id":454,"category":"マネジメント系","field":"品質管理","question":"テスト密度基準内・欠陥密度が基準値の120%以上の場合に行う活動はどれか。","options":["ア: 欠陥の受当性を確認する。","イ: 欠陥が多いので原因分析し品質改善する。","ウ: テストケースの受当性を確認する。","エ: テストケースを追加する。"],"answer":"ウ","explanation":"欠陥密度が高い場合、テストの観点に偏りがないか妥当性確認が必要です。"},
  {"id":455,"category":"マネジメント系","field":"SLA","question":"SLAの可用性目標99.5%に対し実績99.3%だった月に、目標達成に必要だったサービス停止時間の削減は最低何時間か。","options":["ア: 0.4","イ: 0.6","ウ: 1.3","エ: 1.95"],"answer":"イ","explanation":"720時間×(99.5%-99.3%) = 720×0.002 = 1.44時間の差が生じており、0.6時間の削減で達成可能です。"},
  {"id":456,"category":"マネジメント系","field":"クラウド","question":"ネットワーク・サーバをIaaSに移行後、ミドルウェアをPaaSに移行した場合に不要となる運用作業の組合せはどれか。","options":["ア: ①","イ: ①③","ウ: ②③","エ: ③"],"answer":"ウ","explanation":"PaaS移行でミドルウェアの運用（OS・ミドルウェアのパッチ適用等）が不要になります。"},
  {"id":457,"category":"マネジメント系","field":"サービス管理","question":"「サービスの提供やマネジメントの成功に重要な要素」を特定したものを何というか。","options":["ア: CSF","イ: KGI","ウ: KPI","エ: OKR"],"answer":"ア","explanation":"CSF（Critical Success Factor：重要成功要因）はサービス成功に不可欠な要素を特定したものです。"},
  {"id":458,"category":"マネジメント系","field":"システム監査","question":"システム監査におけるワークスループ法の説明として適切なものはどれか。","options":["ア: 資料・文書を入手し内容を点検する。","イ: 関係者に口頭で問い合わせ回答を入手する。","ウ: データの生成から利用までのプロセスと一連のコントロールを確認する。","エ: テストデータを処理し期待結果が出力されるか確認する。"],"answer":"ウ","explanation":"ワークスループ法はデータの流れとコントロールを追跡確認する監査手続です。"},
  {"id":459,"category":"マネジメント系","field":"システム監査","question":"システム監査における「監査手続き」として最も適切なものはどれか。","options":["ア: 監査計画の立案や業務進捗管理のための手続き","イ: 監査結果を報告書に記述する手続き","ウ: 監査項目について十分かつ適切な証拠を入手するための手続き","エ: 監査チームを編成する手続き"],"answer":"ウ","explanation":"監査手続きは十分かつ適切な監査証拠を入手するための方法・手順です。"},
  {"id":460,"category":"マネジメント系","field":"システム管理基準","question":"ユーザ受入テストの監査チェックポイントとして適切なものはどれか。","options":["ア: 業務要件が適切に反映されていることを確認するため利用者の立場からテストされていること","イ: IT戦略の目標達成確認のため客観的な情報に基づいてテストされていること","ウ: システム要件が反映されていることを確認するため全構成要素の中間成果物もレビューされていること","エ: 移行後に本番環境が利用可能かどうかレビューされていること"],"answer":"ア","explanation":"ユーザ受入テストは利用者の立場から業務要件が実装されているかを確認するテストです。"},
  {"id":461,"category":"ストラテジ系","field":"デジタル化","question":"DX認定制度における認定基準に含まれている事項はどれか。","options":["ア: DX戦略の策定・発信に加えデジタル技術活用の成果目標も達成していること","イ: 経営ビジョン・ビジネスモデルの方向性を公表しDX戦略を公表していること","ウ: 申請対象が中小企業基本法で定められた中小企業であること","エ: デジタルガバナンス・コード3.0の全項目に対応していること"],"answer":"イ","explanation":"DX認定は経営ビジョンとDX戦略の対外公表が主な基準で、成果達成は必須ではありません。"},
  {"id":462,"category":"ストラテジ系","field":"ビジネス戦略","question":"顧客に対するフロントタウンマーケティングを実現する統合的なソリューションとして適切なものはどれか。","options":["ア: CRMソリューション","イ: HRMソリューション","ウ: SCMソリューション","エ: 財務管理ソリューション"],"answer":"ア","explanation":"CRM（顧客関係管理）ソリューションは顧客向けマーケティングや営業活動を統合的に支援します。"},
  {"id":463,"category":"ストラテジ系","field":"クラウド","question":"クラウドサービス提供を迅速に実現するためのプロビジョニングの説明はどれか。","options":["ア: 企画・設計・開発・保守などのサービスを一貫して提供する。","イ: 共通のデータセンターをインターネット経由で利用する。","ウ: 自社でハードウェア・ネットワーク環境を用意し業務パッケージを導入する。","エ: 利用者の需要を予測しリソースを計画的に調達して提供できるよう備える。"],"answer":"エ","explanation":"プロビジョニングは需要予測に基づきリソースを事前調達・準備し、要求に応じてサービス提供できるようにする活動です。"},
  {"id":464,"category":"ストラテジ系","field":"コスト管理","question":"ABCを用いた製品Xの見積・提案書作成に関する月間総人件費削減効果はいくらか。（業務時間20%削減）","options":["ア: 4万円","イ: 8万円","ウ: 12万円","エ: 14万円"],"answer":"ウ","explanation":"ABCで算出した製品Xの見積・提案書作成コストの20%削減額を合計すると12万円になります。"},
  {"id":465,"category":"ストラテジ系","field":"システム管理基準","question":"企画プロセスにおけるビジネス分析の達成目標として適切なものはどれか。","options":["ア: あるべきビジネスモデル及び業務プロセスによって生じる問題やメリットが明確にされている。","イ: 情報システム間のインターフェースが特定されている。","ウ: 重要な情報システムの性能・稼働率の測定量が明確にされている。","エ: 優先順位が付された要望が業務要件として合意されている。"],"answer":"ア","explanation":"ビジネス分析の目標はあるべきビジネスモデルと現状のギャップを明確にすることです。"},
  {"id":466,"category":"ストラテジ系","field":"ベンダー管理","question":"情報システム・モデル取引・契約書に照らし、準委任型が適切なフェーズの組み合わせはどれか。","options":["ア: a, b","イ: a, d","ウ: b, c","エ: b, d"],"answer":"イ","explanation":"要件定義・運用テストなど成果物の明確化が難しいフェーズは準委任型が適切です。"},
  {"id":467,"category":"ストラテジ系","field":"経営戦略","question":"市場成長率と相対的市場シェアから最適な資源配分方針を求める手法はどれか。","options":["ア: 3C","イ: BSC","ウ: PPM","エ: SWOT"],"answer":"ウ","explanation":"PPM（プロダクト・ポートフォリオ・マネジメント）は市場成長率と市場シェアの2軸で事業を分析します。"},
  {"id":468,"category":"ストラテジ系","field":"営業戦略","question":"プライスライニング戦略はどれか。","options":["ア: 複数の価格帯に分けて商品を用意する。","イ: 品質をアピールするため意図的に価格を高く設定する。","ウ: 商品本体を安くし関連消耗品の販売で利益を得る。","エ: 新商品に高い価格を設定して早期に利益を回収する。"],"answer":"ア","explanation":"プライスライニングは複数の価格帯（ライン）を設定して顧客の選択を容易にする価格戦略です。"},
  {"id":469,"category":"ストラテジ系","field":"ビジネス戦略","question":"カーシェアビジネスのビジネスモデルキャンバスでbに該当するものはどれか。","options":["ア: 月会費、利用料","イ: 車両","ウ: 車両の時間貸し","エ: 必要なときだけ車両を使いたい人"],"answer":"ウ","explanation":"ビジネスモデルキャンバスの価値提案（Value Proposition）はカーシェアでは「車両の時間貸し」です。"},
  {"id":470,"category":"ストラテジ系","field":"ビジネスモデル","question":"フリーミアムの特徴はどれか。","options":["ア: Web広告だけを収益源としているのでサービス維持が困難。","イ: 全ての利用者に広く課金するモデル。","ウ: 有料と無料の境界が明確で有料サービスの優位性がはっきりしている。","エ: 利用者ごとのコストが大きく少数の利用者限定で効果がある。"],"answer":"ウ","explanation":"フリーミアムは基本機能無料・高度機能有料のモデルで、有料・無料の差別化が明確です。"},
  {"id":471,"category":"ストラテジ系","field":"機械学習","question":"エッジデバイスで行われる推論処理として適切なものはどれか。","options":["ア: 試行錯誤で行動に報酬を与えて学習するプロセス","イ: 学習したモデルに従い実際にデータの識別などを行うプロセス","ウ: 正解ラベル付きデータでモデルを作成するプロセス","エ: 正解ラベルなしデータでモデルを作成するプロセス"],"answer":"イ","explanation":"エッジデバイスは学習済みモデルを使って実データを識別・推論します。学習はクラウド側で実施。"},
  {"id":472,"category":"ストラテジ系","field":"スマートファクトリー","question":"スマートファクトリーでAIを用いたマシンビジョンの目的として適切なものはどれか。","options":["ア: AIが需要予測し生産数を最適化する。","イ: VRゴーグルにAIがガイドを表示し作業効率を向上させる。","ウ: 設計変更内容をAIが整理し製造現場に伝達する。","エ: 人間の目視検査をAIが代替し検査効率を向上させる。"],"answer":"エ","explanation":"マシンビジョンはカメラ・AIによる外観検査の自動化で、人間の目視を代替します。"},

  {"id":474,"category":"ストラテジ系","field":"予測モデル","question":"需要予測の時系列モデルに関する記述として適切なものはどれか。","options":["ア: 移動平均法では期間を長くするほど短期的変化の影響が大きくなる。","イ: 移動平均法は直近の変化把握には向かない。","ウ: 指数平滑法では平滑化定数が0%に近いほど直前の実績値を重視する。","エ: 指数平滑法は直近の実績値を重視するほど予測精度が向上すると考えられる場合に有効。"],"answer":"エ","explanation":"指数平滑法は直近データに高い重みを置く手法で、最新トレンドを重視する需要予測に有効です。"},
  {"id":475,"category":"ストラテジ系","field":"品質管理","question":"引き出された多くの事実やアイデアを類似するものでグルーピングしていく収束技法はどれか。","options":["ア: NM法","イ: ゴードン法","ウ: 親和図法","エ: ブレーンストーミング"],"answer":"ウ","explanation":"親和図法（KJ法）は多数のアイデアや事実をグループ化・整理する収束技法です。"},
  {"id":476,"category":"ストラテジ系","field":"財務分析","question":"卸売業A社と小売業B社を比較したとき、卸売業A社について適切な記述はどれか。","options":["ア: 売上高・総資産がともに低く総資産回転率も低い。","イ: 売上高営業利益率が高く総資産営業利益率も高い。","ウ: 営業利益・総資産がともに低く総資産営業利益率も低い。","エ: 総資産回転率が高く総資産営業利益率も高い。"],"answer":"エ","explanation":"卸売業は利益率は低いが回転率が高いため、総資産営業利益率は高くなります。"},
  {"id":477,"category":"ストラテジ系","field":"財務管理","question":"売上高7000万円で200万円損失、9000万円で600万円利益のとき、売上高8000万円の変動費は何万円か。","options":["ア: 3,200","イ: 4,000","ウ: 4,800","エ: 5,600"],"answer":"ウ","explanation":"損益分岐点計算より固定費を求め、変動費率×8000万円 = 4,800万円。"},
  {"id":478,"category":"ストラテジ系","field":"著作権","question":"生成AIで画像生成する行為やその利用が著作権侵害にあたるか否かに関して適切な記述はどれか。","options":["ア: 著作権保護画像をデータセットに使ったAIで生成すると常に著作権侵害になる。","イ: 生成画像が既存の著作権保護画像と類似しておりそれを公開した場合、著作権侵害となる可能性がある。","ウ: AI生成画像は常に著作権の対象外で著作権侵害の懸念は生じない。","エ: AI生成画像は私的使用に限り認められ商業利用は常に著作権侵害となる。"],"answer":"イ","explanation":"既存著作物に類似した生成物の公開は著作権侵害となる可能性があります。"},
  {"id":479,"category":"ストラテジ系","field":"金融技術","question":"資金決済法における暗号資産に関する記述として適切なものはどれか。","options":["ア: 暗号資産交換業者は財務的規制を受けない。","イ: 暗号資産は不特定者間で使用でき電子的に記録・移転できる法定通貨ではない資産で法定通貨と相互交換できる。","ウ: 暗号資産はブロックチェーンで集中管理され銀行で入手・交換できる。","エ: 発行者が利用者ごとに残高を管理し指定加盟店のみで使用できる。"],"answer":"イ","explanation":"暗号資産は法定通貨ではなく電子的に移転可能で、法定通貨との交換が可能な資産です。"},
  {"id":480,"category":"ストラテジ系","field":"環境対策","question":"欧州へ電子部品を輸出するRoHS指令の目的として適切なものはどれか。","options":["ア: 家電製品のリサイクル・廃棄物削減と資源有効利用の推進","イ: 電磁妨害が無線通信等の正常動作を妨げるレベルを超えないようにする","ウ: 大量破壊兵器の開発・拡散、通常兵器の蓄積防止","エ: 電気電子製品の全ライフサイクルで有害物質が環境・人の健康に及ぼす危険を最小化する"],"answer":"エ","explanation":"RoHS指令は鉛・水銀・カドミウム等の有害物質の使用を規制し、電子機器による環境・健康リスクを最小化します。"}
