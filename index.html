<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP対策アプリ — 応用情報技術者試験 午前対策</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #161920; --surface2: #1e2230; --border: #2a2e3d;
    --text: #e2e6f0; --text-muted: #6b7394; --accent-am: #f5c842; --accent-pm: #b07ef8;
    --green: #4ade80; --red: #f87171; --cyan: #67e8f9; --radius: 12px;
    --mono: 'JetBrains Mono', monospace; --sans: 'Noto Sans JP', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 32px 16px 64px; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; z-index: 0; }
  .app { position: relative; z-index: 1; width: 100%; max-width: 720px; }
  header { text-align: center; margin-bottom: 32px; animation: fadeDown .5s ease both; }
  .header-badge { display: inline-block; font-family: var(--mono); font-size: 11px; letter-spacing: .12em; color: var(--text-muted); border: 1px solid var(--border); padding: 4px 12px; border-radius: 99px; margin-bottom: 16px; }
  header h1 { font-size: clamp(22px, 5vw, 32px); font-weight: 700; letter-spacing: -.02em; line-height: 1.2; margin-bottom: 8px; }
  header h1 span { color: var(--accent-am); }
  .header-sub { color: var(--text-muted); font-size: 13px; margin-bottom: 16px; }
  .year-selector { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .year-btn { padding: 8px 18px; border: 1.5px solid var(--border); border-radius: 6px; background: var(--surface2); color: var(--text-muted); cursor: pointer; font-family: var(--sans); font-size: 13px; font-weight: 700; transition: all .2s; }
  .year-btn.active { background: var(--accent-am); border-color: var(--accent-am); color: #0d0f14; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 16px; animation: fadeUp .4s ease both; }
  .card + .card { animation-delay: .07s; }
  .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .mode-btn { background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px 20px; cursor: pointer; transition: border-color .2s, transform .15s, background .2s; text-align: left; color: var(--text); font-family: var(--sans); }
  .mode-btn:hover { transform: translateY(-2px); }
  .mode-btn.am:hover { border-color: var(--accent-am); background: rgba(245,200,66,.06); }
  .mode-btn.pm:hover { border-color: var(--accent-pm); background: rgba(176,126,248,.06); }
  .mode-btn .mode-icon { font-size: 28px; margin-bottom: 10px; display: block; }
  .mode-btn .mode-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .mode-btn.am .mode-title { color: var(--accent-am); }
  .mode-btn.pm .mode-title { color: var(--accent-pm); }
  .mode-btn .mode-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .section-head .icon { font-size: 20px; }
  .section-head h2 { font-size: 16px; font-weight: 700; }
  .section-head .tag { font-family: var(--mono); font-size: 11px; padding: 2px 8px; border-radius: 4px; margin-left: auto; }
  .tag-tech { background: rgba(103,232,249,.15); color: var(--cyan); }
  .tag-mgmt { background: rgba(245,200,66,.15); color: var(--accent-am); }
  .tag-strat { background: rgba(74,222,128,.15); color: var(--green); }
  .meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .meta-chip { font-size: 12px; padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border); color: var(--text-muted); }
  .question-text { font-size: 15px; line-height: 1.9; margin-bottom: 24px; white-space: pre-wrap; color: var(--text); }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option-btn { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; padding: 14px 18px; cursor: pointer; color: var(--text); font-family: var(--sans); font-size: 14px; text-align: left; transition: border-color .15s, background .15s, transform .1s; line-height: 1.6; }
  .option-btn:hover:not(:disabled) { border-color: var(--cyan); background: rgba(103,232,249,.06); transform: translateX(3px); }
  .option-btn.correct { border-color: var(--green); background: rgba(74,222,128,.1); color: var(--green); }
  .option-btn.wrong { border-color: var(--red); background: rgba(248,113,113,.1); color: var(--red); }
  .option-btn:disabled { cursor: default; transform: none; }
  .result-banner { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-radius: 8px; font-size: 15px; font-weight: 700; margin-bottom: 20px; animation: fadeUp .3s ease both; }
  .result-banner.correct { background: rgba(74,222,128,.12); border: 1px solid var(--green); color: var(--green); }
  .result-banner.wrong { background: rgba(248,113,113,.12); border: 1px solid var(--red); color: var(--red); }
  .result-banner .correct-ans { color: var(--green); font-family: var(--mono); }
  .explanation { background: var(--surface2); border-left: 3px solid var(--cyan); border-radius: 0 8px 8px 0; padding: 16px 18px; font-size: 13.5px; line-height: 1.9; white-space: pre-wrap; color: var(--text-muted); animation: fadeUp .3s .1s ease both; }
  .explanation-label { font-size: 11px; font-family: var(--mono); color: var(--cyan); letter-spacing: .08em; margin-bottom: 10px; display: block; }
  .score-strip { display: flex; gap: 16px; padding: 12px 20px; background: var(--surface2); border-radius: 8px; font-size: 13px; margin-bottom: 16px; animation: fadeDown .4s ease both; }
  .score-item { display: flex; align-items: center; gap: 6px; }
  .score-item .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-green { background: var(--green); }
  .dot-red { background: var(--red); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-family: var(--sans); font-size: 14px; font-weight: 700; transition: transform .15s, opacity .15s; }
  .btn:hover { transform: translateY(-1px); opacity: .9; }
  .btn-primary { background: var(--accent-am); color: #0d0f14; }
  .btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
  .loading { text-align: center; padding: 40px; color: var(--text-muted); font-family: var(--mono); font-size: 13px; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }
  .hidden { display: none !important; }
  @media (max-width: 480px) { .menu-grid { grid-template-columns: 1fr; } .year-selector { gap: 8px; } }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-badge">AP STUDY</div>
    <h1>応用情報技術者試験<br><span>対策アプリ</span></h1>
    <p class="header-sub">公式過去問 — 午前80問</p>
    <div class="year-selector">
      <button id="btn-r07a" class="year-btn active" onclick="switchYear('r07a')">R07秋期</button>
      <button id="btn-r07s" class="year-btn" onclick="switchYear('r07s')">R07春期</button>
      <button id="btn-r06a" onclick="switchYear('r06a')" class="year-btn">R06秋期</button>
      <button id="btn-r06s" class="year-btn" onclick="switchYear('r06s')">R06春期</button>
      <button id="btn-r05a" class="year-btn" onclick="switchYear('r05a')">R05秋期</button>
　　　　<button id="btn-r05s" class="year-btn" onclick="switchYear('r05s')">R05春期</button>
      <button id="btn-r04a" class="year-btn" onclick="switchYear('r04a')">R04秋期</button>

    </div>
  </header>

  <div class="score-strip">
    <div class="score-item"><div class="dot dot-green"></div><span>正解: <strong id="scoreCorrect">0</strong></span></div>
    <div class="score-item"><div class="dot dot-red"></div><span>不正解: <strong id="scoreWrong">0</strong></span></div>
    <div class="score-item" style="margin-left:auto; color:var(--text-muted)">累計 <strong id="scoreTotal">0</strong> 問</div>
  </div>

  <!-- メニュー -->
  <div id="screenMenu" class="card">
    <div class="section-head"><span class="icon">📖</span><h2>モード選択</h2></div>
    <div class="menu-grid">
      <button class="mode-btn am" onclick="startMode('am')">
        <span class="mode-icon">☀️</span>
        <div class="mode-title">午前モード</div>
        <div class="mode-desc">4択問題をランダム出題<br>即時正誤判定・解説表示</div>
      </button>
      <button class="mode-btn pm" onclick="showPmComingSoon()" style="opacity:.45; cursor:not-allowed;">
        <span class="mode-icon">🌙</span>
        <div class="mode-title" style="color:var(--text-muted);">午後モード</div>
        <div class="mode-desc">図表を含む設問を整備中<br>近日公開予定</div>
      </button>
    </div>
  </div>

  <!-- 午前：問題画面 -->
  <div id="screenAm" class="hidden">
    <div class="card">
      <div class="section-head">
        <span class="icon">☀️</span><h2>午前モード</h2>
        <span class="tag" id="amTag">テクノロジ系</span>
      </div>
      <div class="meta-row">
        <span class="meta-chip" id="amCategory">—</span>
        <span class="meta-chip" id="amField">—</span>
      </div>
      <p class="question-text" id="amQuestion">—</p>
      <div class="options" id="amOptions"></div>
    </div>
    <div id="amResult" class="hidden">
      <div class="result-banner" id="amResultBanner"></div>
      <div class="card" style="padding-top:20px">
        <span class="explanation-label">EXPLANATION</span>
        <div class="explanation" id="amExplanation"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="loadAmQuestion()">次の問題へ →</button>
        <button class="btn btn-ghost" onclick="goMenu()">メニューに戻る</button>
      </div>
    </div>
  </div>

</div>
<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 設定
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const EXAMS = [
  { id: 'r07a', label: 'R07秋期', file: 'data/r07a_am.json' },
  { id: 'r07s', label: 'R07春期', file: 'data/r07s_am.json' },
  { id: 'r06a', label: 'R06秋期', file: 'data/r06a_am.json' },
  { id: 'r06s', label: 'R06春期', file: 'data/r06s_am.json' },
  { id: 'r05a', label: 'R05秋期', file: 'data/r05a_am.json' },
  { id: 'r05s', label: 'R05春期', file: 'data/r05s_am.json' },
  { id: 'r04a', label: 'R04秋期', file: 'data/r04a_am.json' },

];


// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 状態
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let AM_QUESTIONS = [];
let currentYear = 'r07a';
const state = { correct: 0, wrong: 0 };

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 年度切り替え
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function switchYear(year) {
  currentYear = year;
  document.querySelectorAll('.year-btn').forEach(b => {
    b.classList.toggle('active', b.id === 'btn-' + year);
  });
  const exam = EXAMS.find(e => e.id === year);
  try {
    const res = await fetch(exam.file);
    const data = await res.json();
    AM_QUESTIONS = data.questions;
  } catch(e) {
    alert('データの読み込みに失敗しました: ' + exam.file);
    return;
  }
  goMenu();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// スコア
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function updateScore() {
  document.getElementById('scoreCorrect').textContent = state.correct;
  document.getElementById('scoreWrong').textContent = state.wrong;
  document.getElementById('scoreTotal').textContent = state.correct + state.wrong;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 画面切り替え
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showOnly(...ids) {
  ['screenMenu','screenAm'].forEach(id => document.getElementById(id).classList.add('hidden'));
  ids.forEach(id => document.getElementById(id)?.classList.remove('hidden'));
}
function goMenu() { showOnly('screenMenu'); }
function showPmComingSoon() { alert('🌙 午後モードは現在整備中です。\n近日公開予定です。'); }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// タグ
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const TAG_CLASS = { 'テクノロジ系': 'tag-tech', 'マネジメント系': 'tag-mgmt', 'ストラテジ系': 'tag-strat' };

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 午前モード
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function startMode(mode) {
  if (mode === 'am') loadAmQuestion();
}

function loadAmQuestion() {
  if (!AM_QUESTIONS.length) { alert('問題データを読み込み中です。しばらくお待ちください。'); return; }
  const q = AM_QUESTIONS[Math.floor(Math.random() * AM_QUESTIONS.length)];

  const tagEl = document.getElementById('amTag');
  tagEl.textContent = q.category;
  tagEl.className = 'tag ' + (TAG_CLASS[q.category] ?? 'tag-tech');

  document.getElementById('amCategory').textContent = q.category;
  document.getElementById('amField').textContent = q.field;
  document.getElementById('amQuestion').textContent = q.question;

  const container = document.getElementById('amOptions');
  container.innerHTML = '';
  q.options.forEach(opt => {
    const key = opt.split(':')[0].trim();
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => answerAm(key, q);
    container.appendChild(btn);
  });

  document.getElementById('amResult').classList.add('hidden');
  document.getElementById('amResultBanner').className = 'result-banner';
  showOnly('screenAm');
}

function answerAm(selected, q) {
  document.querySelectorAll('#amOptions .option-btn').forEach(btn => {
    btn.disabled = true;
    const key = btn.textContent.split(':')[0].trim();
    if (key === q.answer) btn.classList.add('correct');
    if (key === selected && key !== q.answer) btn.classList.add('wrong');
  });

  const isCorrect = selected === q.answer;
  if (isCorrect) state.correct++; else state.wrong++;
  updateScore();

  const banner = document.getElementById('amResultBanner');
  if (isCorrect) {
    banner.className = 'result-banner correct';
    banner.innerHTML = '✔ 正解！';
  } else {
    banner.className = 'result-banner wrong';
    banner.innerHTML = `✘ 不正解　<span style="font-size:13px;font-weight:400;color:var(--text-muted)">正解：</span><span class="correct-ans">${q.answer}</span>`;
  }

  document.getElementById('amExplanation').textContent = q.explanation;
  document.getElementById('amResult').classList.remove('hidden');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 初期ロード
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
switchYear('r07a');
</script>
</body>
</html>
